<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Result Generator</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<div class="app">

    <aside class="sidebar">

        <div class="logo">

            <h1>RESULT GENERATOR</h1>

            <p>Realtime Result Poster Generator</p>

        </div>

        <div class="form-group">

            <label>Pilih Pasaran</label>

            <select id="marketSelect"></select>

        </div>

        <div class="form-group">

            <label>Nama Pasaran</label>

            <input
                type="text"
                id="marketName">

        </div>

        <div class="form-group">

            <label>Tanggal</label>

            <input
                type="text"
                id="dateInput"
                placeholder="20 JUNI 2026">

        </div>

        <div class="form-group">

            <label>Result</label>

            <input
                type="text"
                id="resultInput"
                placeholder="8561">

        </div>

        <div class="button-group">

            <button id="fetchBtn">
                Ambil Result
            </button>

            <button id="generateBtn">
                Generate Poster
            </button>

            <button id="downloadBtn">
                Download JPG
            </button>

        </div>

        <div class="status-box">

            <h3>Status</h3>

            <div class="status-item">
                <span>Pasaran</span>
                <strong id="liveMarket">-</strong>
            </div>

            <div class="status-item">
                <span>Result</span>
                <strong id="liveResult">-</strong>
            </div>

            <div class="status-item">
                <span>Tanggal</span>
                <strong id="liveDate">-</strong>
            </div>

            <div class="status-item">
                <span>Update</span>
                <strong id="lastUpdate">-</strong>
            </div>

        </div>

    </aside>

    <main class="preview">

        <div class="canvas-wrapper">

            <canvas
                id="posterCanvas"
                width="1080"
                height="1080">
            </canvas>

        </div>

    </main>

</div>

<script src="app.js"></script>

</body>
</html>
